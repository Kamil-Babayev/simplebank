services:
  postgres-simple-bank:
    image: postgres:18-alpine3.23
    environment:
      - POSTGRES_PASSWORD=secret
      - POSTGRES_USER=root
      - POSTGRES_DB=simple_bank
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d simple_bank"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_SOURCE=postgresql://root:secret@postgres-simple-bank:5432/simple_bank?sslmode=disable
    depends_on:
      postgres-simple-bank:
        condition: service_healthy